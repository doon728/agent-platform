<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Call Assessment Assistant — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; font-size: 14px; background: #f8fafc; color: #111827; height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-subtitle { font-size: 12px; color: #64748b; }
    .agent-type-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #ede9fe; color: #5b21b6; }

    /* ── Scope bar ── */
    .scope-bar { background: #fefce8; border-bottom: 1px solid #fde68a; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
    .scope-bar label { font-size: 11px; font-weight: 700; color: #854d0e; text-transform: uppercase; letter-spacing: 0.5px; }
    .scope-input-group { display: flex; align-items: center; gap: 6px; }
    .scope-input-group span { font-size: 12px; color: #92400e; font-weight: 600; }
    .scope-input { font-size: 12px; padding: 4px 8px; border: 1px solid #fde68a; border-radius: 5px; background: white; color: #111827; width: 160px; outline: none; }
    .scope-input:focus { border-color: #f59e0b; box-shadow: 0 0 0 2px #fef3c7; }
    .scope-set-btn { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 5px; border: 1px solid #fde68a; background: #fef9c3; color: #854d0e; cursor: pointer; }
    .scope-set-btn:hover { background: #fef08a; }
    .active-scope-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
    .active-scope-chip button { background: none; border: none; cursor: pointer; color: #b45309; font-size: 12px; padding: 0; line-height: 1; }

    /* ── Layout ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .thread { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Messages ── */
    .msg { display: flex; gap: 10px; max-width: 780px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.55; max-width: 640px; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: #6366f1; color: white; border-bottom-right-radius: 3px; }
    .msg.assistant .msg-bubble { background: white; border: 1px solid #e2e8f0; color: #111827; border-bottom-left-radius: 3px; }
    .msg.system .msg-bubble { background: #f1f5f9; color: #64748b; font-size: 12px; border-radius: 6px; font-style: italic; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .msg.user .msg-avatar { background: #6366f1; color: white; }
    .msg.assistant .msg-avatar { background: #f0f4ff; color: #6366f1; border: 1px solid #c7d2fe; }
    .msg-time { font-size: 10px; color: #94a3b8; margin-top: 3px; }
    .msg.user .msg-time { text-align: right; }
    .typing-dots { display: inline-flex; gap: 3px; align-items: center; padding: 4px 0; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    /* ── Input bar ── */
    .input-bar { border-top: 1px solid #e2e8f0; background: white; padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .input-bar textarea { flex: 1; resize: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none; max-height: 120px; min-height: 40px; line-height: 1.5; }
    .input-bar textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 2px #eef2ff; }
    .send-btn { padding: 9px 18px; border-radius: 8px; border: none; background: #6366f1; color: white; font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .send-btn:hover { background: #4f46e5; }
    .send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .clear-btn { padding: 9px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; color: #64748b; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .clear-btn:hover { background: #f8fafc; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Pre-Call Assessment Assistant</div>
    <div class="header-subtitle">care-management · pre-call-assessment</div>
  </div>
  <span class="agent-type-badge">chat_agent</span>
</div>

<div class="scope-bar" id="scopeBar">
  <label>Active Scope</label>
  <!-- scope inputs rendered by JS from DOMAIN_CONFIG -->
</div>

<div class="main">
  <div class="thread" id="thread">
    <div class="msg system">
      <div style="width:100%">
        <div class="msg-bubble">Set scope IDs above to start chatting. You can enter a member_id, case_id, or assessment_id — leave blank to chat without scope context.</div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="messageInput" placeholder="Type a message…" rows="1" onInput="autoResize(this)" onKeyDown="handleKey(event)"></textarea>
    <button class="clear-btn" onclick="clearThread()">Clear</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// ── Config — filled at scaffold time or edit manually ────────────────────
const CONFIG = {
  agentRuntimeUrl: "http://localhost:8001",  // e.g. http://localhost:8001
  tenantId: "t1",
  domainScopes: [{"name":"member","id_field":"member_id"},{"name":"case","id_field":"case_id"},{"name":"assessment","id_field":"assessment_id"}],
  // domainScopes example:
  // [
  //   { name: "member",     id_field: "member_id" },
  //   { name: "case",       id_field: "case_id" },
  //   { name: "assessment", id_field: "assessment_id" },
  // ]
}

// ── State ────────────────────────────────────────────────────────────────
const activeScope = {}   // { member_id: "m-001", case_id: "", ... }
let threadId = null
let isLoading = false
let history = []

// ── Render scope bar ─────────────────────────────────────────────────────
function renderScopeBar() {
  const bar = document.getElementById("scopeBar")
  // Clear existing inputs (keep the label)
  bar.querySelectorAll(".scope-input-group, .active-scope-chip").forEach(el => el.remove())

  CONFIG.domainScopes.forEach(scope => {
    const group = document.createElement("div")
    group.className = "scope-input-group"
    group.id = `scope-group-${scope.id_field}`
    group.innerHTML = `
      <span>${scope.id_field.replace("_", " ")}</span>
      <input class="scope-input" id="input-${scope.id_field}" placeholder="e.g. ${scope.name}-001" value="${activeScope[scope.id_field] || ""}" />
      <button class="scope-set-btn" onclick="setScope('${scope.id_field}')">Set</button>
    `
    bar.appendChild(group)

    // allow Enter to set scope
    group.querySelector("input").addEventListener("keydown", e => {
      if (e.key === "Enter") setScope(scope.id_field)
    })
  })
}

function setScope(idField) {
  const val = document.getElementById(`input-${idField}`).value.trim()
  if (val) {
    activeScope[idField] = val
    addMessage("system", `Scope set: ${idField} = ${val}`)
  } else {
    delete activeScope[idField]
  }
}

// ── Thread ───────────────────────────────────────────────────────────────
function addMessage(role, content) {
  const thread = document.getElementById("thread")

  // Remove empty-state hint
  thread.querySelectorAll(".msg.system").forEach(el => {
    if (el.querySelector(".msg-bubble")?.textContent.includes("Set scope IDs")) el.remove()
  })

  const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
  const div = document.createElement("div")
  div.className = `msg ${role}`

  if (role === "user") {
    div.innerHTML = `
      <div class="msg-avatar">U</div>
      <div><div class="msg-bubble">${escHtml(content)}</div><div class="msg-time">${time}</div></div>
    `
  } else if (role === "assistant") {
    div.innerHTML = `
      <div class="msg-avatar">A</div>
      <div><div class="msg-bubble">${escHtml(content)}</div><div class="msg-time">${time}</div></div>
    `
  } else {
    div.innerHTML = `<div style="width:100%"><div class="msg-bubble">${escHtml(content)}</div></div>`
  }

  thread.appendChild(div)
  thread.scrollTop = thread.scrollHeight
  return div
}

function addTypingIndicator() {
  const thread = document.getElementById("thread")
  const div = document.createElement("div")
  div.className = "msg assistant"
  div.id = "typingIndicator"
  div.innerHTML = `
    <div class="msg-avatar">A</div>
    <div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>
  `
  thread.appendChild(div)
  thread.scrollTop = thread.scrollHeight
}

function removeTypingIndicator() {
  document.getElementById("typingIndicator")?.remove()
}

// ── Send ─────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("messageInput")
  const text = input.value.trim()
  if (!text || isLoading) return

  isLoading = true
  document.getElementById("sendBtn").disabled = true
  input.value = ""
  input.style.height = "40px"

  addMessage("user", text)
  addTypingIndicator()

  // Build context from active scopes
  const ctx = { tenant_id: CONFIG.tenantId, ...activeScope }

  if (!threadId) threadId = "thread-" + Date.now()

  const payload = {
    prompt: text,
    thread_id: threadId,
    context: ctx,
    history: history.slice(-10),
  }

  try {
    const res = await fetch(`${CONFIG.agentRuntimeUrl}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
    const data = await res.json()
    removeTypingIndicator()

    const answer = data.answer || data.response || data.output || JSON.stringify(data)
    addMessage("assistant", answer)

    history.push({ role: "user", content: text })
    history.push({ role: "assistant", content: answer })
  } catch (err) {
    removeTypingIndicator()
    addMessage("system", `Error: ${err.message}. Is the agent runtime running at ${CONFIG.agentRuntimeUrl}?`)
  }

  isLoading = false
  document.getElementById("sendBtn").disabled = false
  input.focus()
}

// ── Helpers ───────────────────────────────────────────────────────────────
function clearThread() {
  document.getElementById("thread").innerHTML = ""
  history = []
  threadId = null
  addMessage("system", "Thread cleared. Set scope IDs above to start chatting.")
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage() }
}

function autoResize(el) {
  el.style.height = "40px"
  el.style.height = Math.min(el.scrollHeight, 120) + "px"
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")
}

// ── Init ─────────────────────────────────────────────────────────────────
renderScopeBar()
document.getElementById("messageInput").focus()
</script>
</body>
</html>
