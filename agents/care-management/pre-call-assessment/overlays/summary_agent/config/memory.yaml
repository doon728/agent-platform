enabled: true

# Read/write are independent per memory type.
read_policies:
  short_term:
    enabled: false   # no conversation loop
  episodic:
    enabled: true    # read case/assessment context for enrichment (optional)
  semantic:
    enabled: true    # read member facts for enrichment (optional)
  summary:
    enabled: false   # summary_agent writes summary, it does not read its own output

# summary_agent memory policy:
# - Reads episodic + semantic for context enrichment (optional, off by default)
# - Writes summary only — all other write types are locked off by agent type contract
# - No short_term — summary_agent has no conversation loop

write_policies:
  short_term:
    enabled: false
    write_locked: true         # summary_agent has no conversation loop
  episodic:
    enabled: false
    write_locked: true         # summary_agent never writes episodic — platform-enforced
  semantic:
    enabled: false
    write_locked: true         # summary_agent never writes semantic — platform-enforced
  summary:
    enabled: true
    write_locked: false        # summary_agent is the only agent that writes summary
    triggers:
      every_n_turns: 10
    allowed_scopes:
    - conversation
    - case

retrieval_policies:
  case:
    episodic:
      include: true
      top_k: 10
  member:
    semantic:
      include: true
      top_k: 5
