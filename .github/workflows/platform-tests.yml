name: Platform Unit Tests

on:
  push:
    branches: [main, "refactor/**"]
    paths:
      - "packages/platform-core/**"
      - "services/platform-services/**"
      - ".github/workflows/platform-tests.yml"
  pull_request:
    paths:
      - "packages/platform-core/**"
      - "services/platform-services/**"
      - ".github/workflows/platform-tests.yml"

permissions:
  contents: read

jobs:
  platform-core:
    name: platform-core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install platform-core (dev)
        working-directory: packages/platform-core
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run platform-core tests
        working-directory: packages/platform-core
        run: pytest tests/ -v --cov=platform_core --cov-report=term-missing

  platform-services:
    name: platform-services unit tests
    runs-on: ubuntu-latest
    needs: platform-core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install platform-core (provides shared deps)
        working-directory: packages/platform-core
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install platform-services runtime deps
        working-directory: services/platform-services
        run: |
          # Install only what's needed for unit tests; full Poetry install is
          # too heavy for CI. langgraph + openai already come via platform-core.
          pip install pytest pytest-asyncio pytest-cov

      - name: Run platform-services tests
        working-directory: services/platform-services
        env:
          OPENAI_API_KEY: test-fake-key-not-used
          ACTIVE_USECASE: test
        run: pytest tests/ -v
