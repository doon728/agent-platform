services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  rag:
    build:
      context: ../..
      dockerfile: services/rag/Dockerfile
    ports:
      - "${RAG_SERVICE_PORT:-8082}:8082"
    env_file:
      - path: ../rag/.env
        required: false
    environment:
      KB_PG_HOST: postgres
      KB_PG_PORT: 5432
      KB_PG_DB: agentdb
      KB_PG_USER: postgres
      KB_PG_PASSWORD: postgres
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
    volumes:
      - ../rag/src:/app/src
      - ../rag/data:/app/data
    depends_on:
      - postgres

  tool-gateway:
    build:
      context: .
    ports:
      - "${TOOL_GATEWAY_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      KB_PG_HOST: postgres
      KB_PG_PORT: 5432
      KB_PG_DB: agentdb
      KB_PG_USER: postgres
      KB_PG_PASSWORD: postgres
      RAG_SERVICE_URL: http://rag:8082
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - rag

volumes:
  pgdata:
