agent:
  type: summary_agent
  planner_mode: none   # deterministic — no LLM planner, fetch_node always calls same tools

tools:
  mode: selected
  allowed:
    - get_member
    - get_member_summary
    - get_assessment_summary
    - get_assessment_tasks

features:
  memory: false          # no conversation to remember
  rag: false             # no KB search — structured tool lookup by ID
  hitl: false            # read-only, no write operations requiring approval
  observability: true
  prompt_versioning: false
