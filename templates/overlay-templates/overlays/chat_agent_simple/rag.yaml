# RAG (retrieval) configuration for new agents scaffolded from this template.
# Operator-editable via admin UI after scaffold. Calls services/rag/ over HTTP at runtime.

enabled: true

# Pre-graph RAG (Dim 2 — Stage 1) — disabled by default in template.
pre_graph:
  enabled: false
  tool: search_kb
  strategy: hybrid
  pattern: naive
  top_k: 3
  similarity_threshold: 0.5

# Planner tool RAG (Dim 2 — Stage 2) — enabled by default in template.
planner_tool:
  enabled: true
  tool: search_kb
  strategy: semantic
  pattern: naive
  top_k: 5
  similarity_threshold: 0.35
  fallback:
    allow_no_results_response: true
