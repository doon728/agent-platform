agent_type: chat_agent_simple

components:
  - planner
  - responder
  - executor

features:
  memory: true
  observability: true
  prompt_versioning: true

required_prompts:
  - planner
  - responder

entrypoint:
  orchestration_graph: orchestration/build_graph.py

# RAG Dimension 2 — pipeline design metadata (read-only, describes what is coded in this overlay)
rag_dimension2:
  pattern: naive
  description: "Single retrieval pass. Query → search_kb → results handed directly to LLM. No retry, reranking, or multi-hop."
  other_patterns:
    - pattern: advanced
      description: "Query rewriting before retrieval, result reranking/filtering after. Still single-hop."
    - pattern: multi_hop
      description: "Retrieves multiple times. Each retrieval is informed by the result of the previous one."
    - pattern: agentic
      description: "Agent decides when to retrieve, what to search, and whether to retry. Dynamic and self-directed."
    - pattern: self_rag
      description: "LLM grades its own retrieved results and retries if quality is too low."