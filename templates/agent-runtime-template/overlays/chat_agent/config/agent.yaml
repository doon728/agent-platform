agent:
  type: chat_agent
  planner_mode: llm
tools:
  mode: selected
  allowed:
    - search_kb
retrieval:
  enabled: true
  default_tool: search_kb
  strategy: semantic
  top_k: 5
  similarity_threshold: 0.35
  fallback:
    allow_no_results_response: true
risk:
  approval_required: false
  risk_levels:
    write_case_note: high
    get_member_summary: low
    get_assessment_summary: low
    get_assessment_tasks: low
    get_member: low
    search_kb: low

hitl:
  adapter: internal
  routing_rules:
    - risk_level: high
      requires_approval: true
    - risk_level: medium
      requires_approval: true
    - risk_level: low
      requires_approval: false
  sla:
    timeout_minutes: 60
features:
  memory: true
  rag: true
  hitl: false
  observability: true
  prompt_versioning: false
