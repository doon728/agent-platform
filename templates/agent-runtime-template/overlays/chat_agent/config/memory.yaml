enabled: true
scope_taxonomy:
  - conversation
  - assessment
  - case
  - member
write_policies:
  short_term:
    enabled: true
    trigger: every_turn
    primary_scope: conversation
    retain_last_n_turns: 12
  episodic:
    enabled: true
    triggers:
      - tool_success
    allowed_scopes:
      - case
      - assessment
  semantic:
    enabled: false
  summary:
    enabled: true
    triggers:
      every_n_turns: 10
    allowed_scopes:
      - conversation
retrieval_policies:
  conversation:
    short_term:
      include: true
      max_turns: 12
    summary:
      include: true
      max_items: 1
  case:
    episodic:
      include: true
      top_k: 5
context_assembly:
  max_total_items: 12
  prefer_summaries_over_raw: true
  deduplicate: true
